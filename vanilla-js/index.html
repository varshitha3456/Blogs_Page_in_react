<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <!-- Navbar -->
  <nav class="bg-blue-500 p-4 flex justify-between items-center">
    <h1 class="text-white text-2xl font-bold">Blog App</h1>
    <button onclick="showForm()" class="bg-white text-blue-500 px-3 py-1 rounded">Add Post</button>
  </nav>

  <!-- Add / Edit Form -->
  <div id="form-section" class="hidden max-w-xl mx-auto mt-6 bg-white p-4 rounded shadow">
    <h2 id="form-heading" class="text-lg font-semibold mb-3">Add New Post</h2>

    <input id="post-title" type="text" placeholder="Title"
      class="w-full border border-gray-300 p-2 rounded mb-3"/>

    <textarea id="post-body" placeholder="Write something..." rows="4"
      class="w-full border border-gray-300 p-2 rounded mb-3"></textarea>

    <div class="flex gap-2">
      <button onclick="submitPost()" class="bg-blue-500 text-white px-4 py-2 rounded">Save</button>
      <button onclick="cancelForm()" class="bg-gray-300 px-4 py-2 rounded">Cancel</button>
    </div>
  </div>

  <!-- Posts Section -->
  <div class="max-w-6xl mx-auto mt-6 px-4">
    <h2 class="text-xl font-semibold mb-4">Posts</h2>
    <div id="loading" class="text-gray-500">Loading...</div>
    <div id="posts" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </div>

  <script>
    const API = "https://jsonplaceholder.typicode.com/posts";
    let posts = [];
    let editId = null;

    // READ - fetch posts
    fetch(API + "?_limit=12")
      .then(res => res.json())
      .then(data => {
        posts = data;
        document.getElementById("loading").style.display = "none";
        renderPosts();
      });

    function renderPosts() {
      const container = document.getElementById("posts");
      container.innerHTML = "";
      posts.forEach(post => {
        const card = document.createElement("div");
        card.className = "bg-white p-4 rounded shadow";
        card.innerHTML = `
          <p class="text-xs text-gray-400 mb-1">Post #${post.id}</p>
          <h3 class="font-semibold text-gray-800 capitalize mb-2">${post.title}</h3>
          <p class="text-sm text-gray-600 mb-3">${post.body.substring(0, 100)}...</p>
          <div class="flex gap-2">
            <button onclick="editPost(${post.id})" class="bg-yellow-400 text-white px-3 py-1 rounded text-sm">Edit</button>
            <button onclick="deletePost(${post.id})" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Delete</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // SHOW FORM
    function showForm() {
      editId = null;
      document.getElementById("form-heading").textContent = "Add New Post";
      document.getElementById("post-title").value = "";
      document.getElementById("post-body").value = "";
      document.getElementById("form-section").classList.remove("hidden");
    }

    function cancelForm() {
      document.getElementById("form-section").classList.add("hidden");
    }

    // CREATE
    function submitPost() {
      const title = document.getElementById("post-title").value.trim();
      const body = document.getElementById("post-body").value.trim();

      if (!title || !body) {
        alert("Please fill all fields");
        return;
      }

      if (editId) {
        // UPDATE
        // posts created locally have id = Date.now(), which does not
        // exist on the fake API, so skip the fetch call for them
        if (editId > 100) {
          const index = posts.findIndex(p => p.id === editId);
          posts[index].title = title;
          posts[index].body = body;
          cancelForm();
          renderPosts();
          return;
        }

        fetch(API + "/" + editId, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title: title, body: body, userId: 1 })
        })
        .then(res => res.json())
        .then(() => {
          const index = posts.findIndex(p => p.id === editId);
          posts[index].title = title;
          posts[index].body = body;
          cancelForm();
          renderPosts();
        });

      } else {
        // CREATE
        fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title: title, body: body, userId: 1 })
        })
        .then(res => res.json())
        .then(newPost => {
          newPost.id = Date.now();
          posts.unshift(newPost);
          cancelForm();
          renderPosts();
        });
      }
    }

    // EDIT
    function editPost(id) {
      const post = posts.find(p => p.id === id);
      editId = id;
      document.getElementById("form-heading").textContent = "Edit Post";
      document.getElementById("post-title").value = post.title;
      document.getElementById("post-body").value = post.body;
      document.getElementById("form-section").classList.remove("hidden");
      window.scrollTo(0, 0);
    }

    // DELETE
    function deletePost(id) {
      if (!confirm("Are you sure you want to delete this post?")) return;

      // posts created locally (id > 100) don't exist on the fake API
      if (id > 100) {
        posts = posts.filter(p => p.id !== id);
        renderPosts();
        return;
      }

      fetch(API + "/" + id, { method: "DELETE" })
        .then(() => {
          posts = posts.filter(p => p.id !== id);
          renderPosts();
        });
    }
  </script>

</body>
</html>
